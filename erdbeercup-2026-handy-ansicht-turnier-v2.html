function bracketHtml(page){return (page.layout||"split").toLowerCase()==="normal"?renderNormalBracket(page):renderBracket(page)}function short(s){s=clean(s);return s.length>18?s.slice(0,17)+"…":s}

function showPage(i,keep=false){if(!ACTIVE_PAGES.length)ACTIVE_PAGES=visiblePages();if(!ACTIVE_PAGES.length)return;current=(i+ACTIVE_PAGES.length)%ACTIVE_PAGES.length;const p=ACTIVE_PAGES[current];document.querySelectorAll(".screen").forEach((s,n)=>s.classList.toggle("active",n===current));document.getElementById("catName").textContent=p.name;document.getElementById("lead").textContent=p.subtitle||p.info||`${p.size}er Feld · ${((p.layout||"split").toLowerCase()==="normal")?"Normaler Baum":"Split-Bracket"}`;document.getElementById("ball").style.background=p.color||"#f4c84a";const labels=document.getElementById("labels"),pager=document.getElementById("pager");labels.innerHTML="";pager.innerHTML="";ACTIVE_PAGES.forEach((x,n)=>{labels.insertAdjacentHTML("beforeend",`<span data-page="${n}" class="${n===current?"on":""}">${esc(x.name)}</span>`);pager.insertAdjacentHTML("beforeend",`<div class="seg ${n<current?"done":""} ${n===current?"cur":""}"><div class="fill"></div></div>`)});labels.querySelectorAll("[data-page]").forEach(el=>el.onclick=()=>showPage(Number(el.dataset.page)));if(!keep){cycleStart=performance.now();document.getElementById("stage").scrollTo({left:0,top:0,behavior:"smooth"})}fit()}
function frame(now){if(!paused){const p=Math.min((now-cycleStart)/SETTINGS.cycleMs,1),f=document.querySelector(".seg.cur .fill");if(f)f.style.width=p*100+"%";if(p>=1)showPage(current+1)}requestAnimationFrame(frame)}
function openPanel(){sourceUrl.value=SETTINGS.sourceUrl||"";pagesJson.value=JSON.stringify(SETTINGS.pages,null,2);panel.classList.add("open")}function restart(){clearInterval(refreshTimer);render();loadData();refreshTimer=setInterval(loadData,SETTINGS.refreshMs)}settings.onclick=openPanel;zoomOut.onclick=()=>setZoom(zoomLevel-.15);zoomIn.onclick=()=>setZoom(zoomLevel+.15);zoomReset.onclick=()=>setZoom(1);closePanel.onclick=()=>panel.classList.remove("open");resetPanel.onclick=()=>{localStorage.removeItem("erdbeercupHandyTurnier2026v2");SETTINGS=loadSettings();panel.classList.remove("open");restart()};savePanel.onclick=()=>{try{SETTINGS.sourceUrl=sourceUrl.value.trim();SETTINGS.pages=JSON.parse(pagesJson.value);saveSettings();panel.classList.remove("open");restart()}catch(e){alert("Seiten-Einstellung ist kein gueltiges JSON")}};document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")showPage(current+1);if(e.key==="ArrowLeft")showPage(current-1);if(e.key===" "){paused=!paused;e.preventDefault()}if(e.key.toLowerCase()==="f"){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}});window.addEventListener("resize",fit);function clock(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}clock();setInterval(clock,10000);restart();requestAnimationFrame(frame);if(document.fonts)document.fonts.ready.then(fit);
</script></body></html>
